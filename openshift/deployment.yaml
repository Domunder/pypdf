apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui-loaders
  labels:
    app: openwebui-loaders
    app.kubernetes.io/name: openwebui-loaders
    app.kubernetes.io/component: document-extraction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui-loaders
  template:
    metadata:
      labels:
        app: openwebui-loaders
    spec:
      # ------------------------------------------------------------------
      # OpenShift security: do NOT run as root
      # ------------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: openwebui-loaders
          # Replace with your actual image registry path
          image: your-registry.example.com/openwebui-loaders:1.0.0
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5001
              protocol: TCP

          # ----------------------------------------------------------------
          # Tunable settings via environment variables
          # ----------------------------------------------------------------
          env:
            - name: PYPDF_MODE
              value: "single"           # "single" | "page"
            - name: PAGES_DELIMITER
              value: "\n"              # delimiter inserted between pages in single mode
            - name: EXTRACT_IMAGES
              value: "false"           # set "true" to enable image OCR (requires RapidOCR)
            - name: THREAD_WORKERS
              value: "4"
            - name: PORT
              value: "5001"
            # Optional API key — set via a Secret (see notes below)
            # - name: API_KEY

          # ----------------------------------------------------------------
          # Read-only filesystem: mount writable scratch space
          # ----------------------------------------------------------------
          volumeMounts:
            - name: tmp
              mountPath: /tmp

          # ----------------------------------------------------------------
          # Resource limits — tune to your workload
          # ----------------------------------------------------------------
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ----------------------------------------------------------------
          # Probes
          # ----------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: tmp
          emptyDir: {}

      # Restart policy for Pods managed by a Deployment must be Always
      restartPolicy: Always
